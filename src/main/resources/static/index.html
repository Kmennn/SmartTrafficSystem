<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Traffic System</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            color: #333;
            padding: 30px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2a5298;
        }

        label {
            font-weight: 600;
            margin-top: 10px;
            display: block;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #2a5298;
        }

        .checkbox {
            margin-top: 10px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2a5298;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 10px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .success {
            border-left: 5px solid #28a745;
        }

        .error {
            border-left: 5px solid #dc3545;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚦 Traffic Violation Checker</h2>

    <label>Vehicle ID</label>
    <input type="text" id="vehicleId" placeholder="MH12AB1234">

    <label>Speed (km/h)</label>
    <input type="number" id="speed" placeholder="Enter speed">

    <label>Zone</label>
    <input type="text" id="zone" placeholder="Pune-East">

    <div class="checkbox">
        <input type="checkbox" id="emergency">
        <label for="emergency">Emergency Vehicle</label>
    </div>

    <button onclick="checkViolation()">Check Violation</button>

    <div id="result" class="result"></div>
</div>

<script>
    function checkViolation() {

        const data = {
            vehicleId: document.getElementById("vehicleId").value,
            speed: parseFloat(document.getElementById("speed").value),
            zone: document.getElementById("zone").value,
            emergency: document.getElementById("emergency").checked
        };

        fetch("/traffic/check", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(result => {
            document.getElementById("result").className = "result success";
            document.getElementById("result").innerText =
                "Vehicle: " + result.vehicleId + "\n" +
                "Speed: " + result.speed + "\n" +
                "Zone: " + result.zone + "\n" +
                "Fine: ₹" + result.fine;
        })
        .catch(err => {
            document.getElementById("result").className = "result error";
            document.getElementById("result").innerText = "Error processing request";
        });
    }
</script>

</body>
</html>
